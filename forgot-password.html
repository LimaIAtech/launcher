<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lima IA tech · Recuperar senha</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0a1628; --surface: #111e38; --cyan: #00C4FF; --blue: #5AAAE8; --light: #EBF2FB; --muted: #6b8db5; --border: rgba(90,170,232,0.2); }
  body { background: var(--bg); font-family: 'Nunito', sans-serif; color: var(--light); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem 2rem; width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 1.5rem; }
  .logo { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .logo p { font-size: 11px; color: var(--blue); font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
  h1 { font-size: 18px; font-weight: 800; color: var(--light); text-align: center; }
  .desc { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.6; }
  button[type=button] { width: 100%; background: var(--cyan); color: #0a1628; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer; transition: opacity 0.2s; }
  button[type=button]:hover { opacity: 0.88; }
  button[type=button]:disabled { opacity: 0.5; cursor: not-allowed; }
  .success { font-size: 13px; color: #4ade80; background: rgba(74,222,128,0.1); border-radius: 10px; padding: 14px; text-align: center; display: none; line-height: 1.6; }
  .success.show { display: block; }
  .back { text-align: center; font-size: 13px; }
  .back a { color: var(--blue); text-decoration: none; font-weight: 600; }
  .back a:hover { color: var(--cyan); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="-4 0 215 72" width="200" height="32" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="v1" x1="4" y1="4" x2="68" y2="68" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#5AAAE8"/><stop offset="100%" stop-color="#00C4FF"/></linearGradient><linearGradient id="v2" x1="4" y1="68" x2="68" y2="4" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#00C4FF" stop-opacity="0.45"/><stop offset="100%" stop-color="#5AAAE8" stop-opacity="0.15"/></linearGradient></defs><path d="M 36,4 C 36,4 42,4 52,14 C 62,24 68,36 68,36 C 68,36 68,42 58,52 C 48,62 36,68 36,68 C 36,68 30,68 20,58 C 10,48 4,36 4,36 C 4,36 4,30 14,20 C 24,10 36,4 36,4 Z" stroke="url(#v1)" stroke-width="2.2" fill="none"/><path d="M 20,36 L 36,36" stroke="url(#v1)" stroke-width="2.8" fill="none" stroke-linecap="round"/><path d="M 36,36 L 36,20" stroke="url(#v1)" stroke-width="2.8" fill="none" stroke-linecap="round"/><path d="M 36,36 L 73,36" stroke="url(#v1)" stroke-width="3.2" fill="none" stroke-linecap="round"/><path d="M 36,36 L 36,52" stroke="url(#v2)" stroke-width="2" fill="none" stroke-linecap="round"/><circle cx="20" cy="36" r="3" fill="#5AAAE8" opacity="0.75"/><circle cx="36" cy="36" r="5.5" fill="#0F1E3C"/><circle cx="36" cy="36" r="5.5" stroke="url(#v1)" stroke-width="1.8" fill="none"/><circle cx="36" cy="36" r="2.2" fill="#00C4FF"/><circle cx="73" cy="36" r="4" fill="#00C4FF"/><circle cx="73" cy="36" r="7" fill="#00C4FF" opacity="0.11"/><circle cx="36" cy="20" r="2.8" fill="#5AAAE8" opacity="0.7"/><circle cx="36" cy="52" r="2.2" fill="#5AAAE8" opacity="0.3"/><text x="84" y="44" font-family="'Nunito',Arial,sans-serif" font-size="30" font-weight="800"><tspan fill="#FFF">Lima</tspan><tspan fill="#00C4FF" font-weight="900">IA</tspan></text></svg>
    <p>Painel de Ferramentas</p>
  </div>

  <h1>Recuperar senha</h1>
  <p class="desc">Clique no botão abaixo para receber um link de redefinição no seu e-mail cadastrado.</p>

  <div id="success" class="success">Link enviado! Verifique seu e-mail e clique no link para redefinir sua senha. O link expira em 15 minutos.</div>

  <button type="button" id="btn" onclick="handleForgot()">Enviar link de recuperação</button>

  <div class="back"><a href="/login.html">← Voltar para o login</a></div>
</div>

<script>
async function handleForgot() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Enviando…';
  try {
    await fetch('/api/forgot-password', { method: 'POST' });
    document.getElementById('success').classList.add('show');
    btn.style.display = 'none';
  } catch {
    btn.disabled = false;
    btn.textContent = 'Enviar link de recuperação';
  }
}
</script>
</body>
</html>
